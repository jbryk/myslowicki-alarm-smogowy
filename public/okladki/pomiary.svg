<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Dron i pomiar jakości powietrza">
  <rect width="800" height="400" fill="#E9F6EE"/>
  <rect y="300" width="800" height="100" fill="#d6ecdf"/>
  <!-- panorama dachów -->
  <g fill="#bcd6e8">
    <polygon points="60,300 130,250 200,300"/>
    <polygon points="180,300 250,240 320,300"/>
    <polygon points="600,300 670,250 740,300"/>
  </g>
  <!-- dron -->
  <g transform="translate(400,150)">
    <rect x="-46" y="-10" width="92" height="20" rx="8" fill="#10314F"/>
    <rect x="-70" y="-16" width="30" height="8" rx="4" fill="#0F75BC"/>
    <rect x="40" y="-16" width="30" height="8" rx="4" fill="#0F75BC"/>
